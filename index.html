<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#0f1220" />
  <title>Pixel Recall</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css?v=daily365-v7" />
</head>
<body>
  <div class="floating-view-scale">
    <div class="view-scale" role="group" aria-label="Interface size">
      <button id="scaleDownBtn" class="scale-button" type="button" aria-label="Make everything smaller">−</button>
      <button id="scaleResetBtn" class="scale-value" type="button" aria-label="Reset interface size">100%</button>
      <button id="scaleUpBtn" class="scale-button" type="button" aria-label="Make everything larger">+</button>
    </div>
  </div>

  <main class="app">
    <section class="hero">
      <p class="eyebrow">Daily visual memory puzzle</p>

      <div class="brand-lockup">
        <img class="app-icon" src="icon.svg" alt="" width="50" height="50" />
        <h1>Pixel Recall</h1>
      </div>

      <p class="subtitle">Memorize the pixel art, then redraw it from memory.</p>

      <div class="mode-switch" role="group" aria-label="Game mode">
        <button id="dailyModeBtn" class="mode-option" type="button" aria-pressed="true">
          Daily
        </button>
        <button id="journeyModeBtn" class="mode-option" type="button" aria-pressed="false">
          Journey
        </button>
      </div>
    </section>

    <section class="card">
      <div class="topbar">
        <div class="puzzle-heading">
          <p id="levelInfo" class="level-info muted">Daily #185</p>
          <p id="puzzleName" class="puzzle-name" hidden></p>
        </div>

        <div id="scoreBox" class="score-box" aria-label="Score">—</div>
      </div>

      <div id="grid" class="grid" aria-label="Drawing grid"></div>

      <p id="message" class="message" aria-live="polite">
        Press Start and memorize the pattern.
      </p>

      <div class="controls">
        <button id="startBtn" type="button">Start</button>
        <button id="clearBtn" class="secondary" type="button">Clear</button>
        <button id="checkBtn" class="secondary" type="button">Check</button>
      </div>
    </section>

    <section class="legend" aria-label="Result colors">
      <span><b class="green"></b>Correct</span>
      <span><b class="red"></b>Extra</span>
      <span><b class="blue"></b>Missed</span>
    </section>

    <button id="shareBtn" class="share-button secondary" type="button" disabled>
      Share result
    </button>

    <section id="sharePanel" class="share-panel" aria-labelledby="sharePanelTitle" hidden>
      <div class="share-panel-header">
        <div>
          <p id="sharePanelTitle" class="share-panel-title">Share result</p>
          <p id="sharePanelMessage" class="share-panel-message">
            Share the result link, or copy and download the result image.
          </p>
        </div>
        <button id="closeSharePanelBtn" class="icon-button" type="button" aria-label="Close share options">×</button>
      </div>

      <img id="resultPreview" class="result-preview" alt="Preview of the Pixel Recall result image" />

      <div class="share-destinations" aria-label="Share destinations">
        <a id="whatsAppShare" class="share-destination" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a id="facebookShare" class="share-destination" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a id="xShare" class="share-destination" target="_blank" rel="noopener noreferrer">X</a>
        <a id="emailShare" class="share-destination">Email</a>
      </div>

      <div class="share-panel-actions">
        <button id="nativeImageShareBtn" type="button" hidden>Share image</button>
        <button id="copyLinkBtn" class="secondary" type="button">Copy link</button>
        <button id="copyImageBtn" class="secondary" type="button">Copy image</button>
        <button id="downloadImageBtn" class="secondary" type="button">Download image</button>
      </div>
    </section>
  </main>

  <script src="script.js?v=daily365-v7"></script>
</body>
</html>
